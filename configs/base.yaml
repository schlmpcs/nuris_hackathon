input:
  scene_paths: []
  aoi_path: ""
  zones_path: null

crs:
  working_crs_strategy: auto_utm
  export_epsg: 4326

tiling:
  tile_size: 1024
  overlap: 128

model:
  backend: heuristic
  checkpoint: null
  device: cpu
  class_thresholds:
    building: 0.55
    road: 0.5
    water: 0.45

filtering:
  building_min_area_m2: 12.0
  road_min_length_m: 10.0
  water_min_area_m2: 25.0

export:
  output_dir: outputs
  geojson_epsg: 4326
  write_geopackage: true

qa:
  sample_size: 50
  confidence_bins: 3
