dataset:
  name: landcover_ai
  dataset_root: data/landcover_ai
  patches_root: data/landcover_ai_patches
  manifest_path: data/landcover_ai_patches/manifest.json
  tile_size: 512
  classes:
    0: background
    1: building
    2: water
    3: road

training:
  model_name: unet
  batch_size: 8
  num_workers: 4
  learning_rate: 0.0001
  epochs: 20
  device: cuda
  seed: 42

augmentation:
  horizontal_flip: true
  vertical_flip: true
  rotate_90: true
  color_jitter: 0.1

export:
  checkpoint_dir: outputs/checkpoints
